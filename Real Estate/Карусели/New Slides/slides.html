<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Slides</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --s: 0.44; }

    body {
      font-family: 'Inter', sans-serif;
      background: #1a1a1a;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 24px;
    }

    .slide-label {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      align-self: flex-start;
    }

    .slide-outer {
      width: calc(1080px * var(--s));
      height: calc(1350px * var(--s));
      overflow: hidden;
      flex-shrink: 0;
    }

    .slide {
      width: 1080px;
      height: 1350px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
      transform: scale(var(--s));
      transform-origin: top left;
    }

    /* COVER */
    .slide-cover {
      background: linear-gradient(175deg, #071428 0%, #0a0a1a 40%, #010610 100%);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      padding: 280px 64px 100px 64px;
    }

    .cover-content {
      position: relative;
      z-index: 2;
    }

    .cover-title {
      font-size: 96px;
      font-weight: 900;
      color: #fff;
      line-height: 1.0;
      letter-spacing: -3px;
      margin-bottom: 40px;
    }

    .cover-divider {
      width: 90px;
      height: 5px;
      background: #0052FF;
      border-radius: 3px;
      margin-bottom: 36px;
    }

    .cover-subtitle {
      font-size: 38px;
      font-weight: 400;
      color: rgba(255,255,255,0.6);
      line-height: 1.45;
    }

    /* CONTENT SLIDE */
    .slide-content {
      background: #000;
      display: flex;
      flex-direction: column;
      padding: 80px 64px;
    }

    .slide-num {
      font-size: 22px;
      font-weight: 700;
      color: #0052FF;
      letter-spacing: 3px;
      margin-bottom: 80px;
    }

    .slide-title {
      font-size: 76px;
      font-weight: 900;
      color: #fff;
      line-height: 1.08;
      letter-spacing: -2px;
      margin-bottom: 48px;
    }

    .slide-text {
      font-size: 44px;
      font-weight: 400;
      color: rgba(255,255,255,0.72);
      line-height: 1.5;
    }

    .slide-text strong {
      color: #fff;
      font-weight: 700;
    }

    .watermark {
      position: absolute;
      bottom: 48px;
      left: 64px;
      font-size: 28px;
      font-weight: 600;
      color: rgba(255,255,255,0.35);
      z-index: 10;
    }
  </style>
</head>
<body>

  <p class="slide-label">Slide 0 — Cover</p>
  <div class="slide-outer">
    <div class="slide slide-cover">
      <div class="cover-content">
        <h1 class="cover-title">Покупка<br>недвижимости</h1>
        <div class="cover-divider"></div>
        <p class="cover-subtitle">Как посчитать реальную сумму заранее</p>
      </div>
      <div class="watermark">@raccoonpro.realestate</div>
    </div>
  </div>

  <p class="slide-label">Slide 1</p>
  <div class="slide-outer">
    <div class="slide slide-content">
      <div class="slide-num">01 / 01</div>
      <h2 class="slide-title">Как посчитать реальную сумму заранее.</h2>
      <p class="slide-text">
        Разберём на примере дома за <strong>$500,000</strong> — чтобы не было сюрпризов в день сделки
      </p>
      <div class="watermark">@raccoonpro.realestate</div>
    </div>
  </div>

</body>
</html>
