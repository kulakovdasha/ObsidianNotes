<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slide 1 — Cover</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #222;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Inter', sans-serif;
  }

  .wrapper {
    transform-origin: center center;
  }

  .slide {
    width: 1080px;
    height: 1350px;
    position: relative;
    background: #111;
    overflow: hidden;
  }

  .bg-image {
    position: absolute;
    inset: 0;
    background-image: url('https://images.unsplash.com/photo-1570129477492-45c003edd2be?w=1080&q=80');
    background-size: cover;
    background-position: center;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(
      to bottom,
      rgba(0,0,0,0.2) 0%,
      rgba(0,0,0,0.3) 40%,
      rgba(0,0,0,0.75) 70%,
      rgba(0,0,0,0.92) 100%
    );
  }

  .content {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 0 72px 100px 72px;
  }

  .title {
    font-size: 96px;
    font-weight: 900;
    color: #FFFFFF;
    letter-spacing: -2.5px;
    line-height: 1.03;
    margin-bottom: 24px;
  }

  .subtitle {
    font-size: 38px;
    font-weight: 400;
    color: rgba(255,255,255,0.6);
    letter-spacing: 0;
    line-height: 1.47;
  }

  .watermark {
    position: absolute;
    bottom: 40px;
    right: 72px;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0;
  }

  .slide-counter {
    position: absolute;
    top: 52px;
    right: 72px;
    font-size: 22px;
    font-weight: 400;
    color: rgba(255,255,255,0.35);
  }
</style>
</head>
<body>
<div class="wrapper">
<div class="slide">
  <div class="bg-image"></div>
  <div class="overlay"></div>

  <div class="slide-counter">1 / 6</div>

  <div class="content">
    <div class="title">Покупка недвижимости — как посчитать реальную сумму заранее</div>
    <div class="subtitle">Разберём на примере дома за $500,000 — чтобы не было сюрпризов в день сделки</div>
  </div>

  <div class="watermark">raccoonpro.realestate</div>
</div>
</div>
<script>
  function scaleSlide() {
    const wrapper = document.querySelector('.wrapper');
    const scaleX = window.innerWidth / 1080;
    const scaleY = window.innerHeight / 1350;
    const scale = Math.min(scaleX, scaleY);
    wrapper.style.transform = `scale(${scale})`;
  }
  scaleSlide();
  window.addEventListener('resize', scaleSlide);
</script>
</body>
</html>
